name: Test cache-write read-only mode

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-node-cache-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create package.json
        run: |
          echo '{"dependencies":{"is-odd":"3.0.1"}}' > package.json
          echo 'node_modules/' > .gitignore

      - uses: salmanmkc/setup-node@feature/cache-read-only
        with:
          node-version: 20
          cache: npm
          cache-write: false

      - run: npm install
      - run: node -e "console.log('Node cache-write=false works')"

  test-python-cache-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create requirements.txt
        run: echo "requests==2.31.0" > requirements.txt

      - uses: salmanmkc/setup-python@feature/cache-read-only
        with:
          python-version: "3.12"
          cache: pip
          cache-write: false

      - run: pip install -r requirements.txt
      - run: python -c "print('Python cache-write=false works')"

  test-go-cache-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create go module
        run: |
          mkdir -p gotest && cd gotest
          go mod init example.com/test
          echo 'package main; import "fmt"; func main() { fmt.Println("Go cache-write=false works") }' > main.go

      - uses: salmanmkc/setup-go@feature/cache-read-only
        with:
          go-version: "1.22"
          cache-dependency-path: gotest/go.sum
          cache-write: false

      - run: cd gotest && go run main.go

  test-java-cache-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create pom.xml
        run: |
          cat > pom.xml << 'POM'
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.test</groupId>
            <artifactId>test</artifactId>
            <version>1.0</version>
          </project>
          POM

      - uses: salmanmkc/setup-java@feature/cache-read-only
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-write: false

      - run: java -version && echo "Java cache-write=false works"

  test-dotnet-cache-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dotnet project
        run: |
          dotnet new console -n testapp
          cd testapp && dotnet add package Newtonsoft.Json --version 13.0.3
          dotnet restore

      - uses: salmanmkc/setup-dotnet@feature/cache-read-only
        with:
          dotnet-version: 8.x
          cache: true
          cache-dependency-path: testapp/packages.lock.json
          cache-write: false

      - run: echo ".NET cache-write=false works"

  # Test that cache-write=true (default) still works
  test-node-cache-write-enabled:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create package.json
        run: |
          echo '{"dependencies":{"is-odd":"3.0.1"}}' > package.json
          echo 'node_modules/' > .gitignore

      - uses: salmanmkc/setup-node@feature/cache-read-only
        with:
          node-version: 20
          cache: npm
          # cache-write defaults to true

      - run: npm install
      - run: node -e "console.log('Node cache-write=true (default) works')"
